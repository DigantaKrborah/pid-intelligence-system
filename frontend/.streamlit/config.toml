[theme]
base            = "dark"
primaryColor    = "#4F8EF7"
backgroundColor = "#0F1117"
secondaryBackgroundColor = "#1E2130"
textColor       = "#F1F5F9"
font            = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true
