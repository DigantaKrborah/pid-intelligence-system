name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff black

      - name: Ruff (style + import sort)
        run: ruff check backend/ frontend/ tests/

      - name: Black (formatting)
        run: black --check backend/ frontend/ tests/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pid_user
          POSTGRES_PASSWORD: pid_pass
          POSTGRES_DB: pid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://pid_user:pid_pass@localhost:5432/pid_test
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          pytest tests/unit/ -v --tb=short --cov=backend --cov-report=term-missing --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
