name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      placeholder: What engineering problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: dropdown
    id: milestone
    attributes:
      label: Suggested Milestone
      options:
        - MVP (must have)
        - V2 (nice to have)
        - Future
