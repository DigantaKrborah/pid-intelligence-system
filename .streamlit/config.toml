[theme]
base                     = "light"
primaryColor             = "#2563EB"
backgroundColor          = "#F1F5F9"
secondaryBackgroundColor = "#FFFFFF"
textColor                = "#0F172A"
font                     = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true
